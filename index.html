<!doctype html>
<html lang="es-CO">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport tipo app nativa: sin zoom del usuario, respeta el notch (safe-area). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Color de la UI del sistema (barra de estado) acorde al tema Onyx. -->
    <meta name="theme-color" content="#0B0B0F" />

    <!-- iOS: comportamiento standalone (pantalla completa, sin barra de Safari). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PrivvaClub" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta
      name="description"
      content="PrivvaClub — Directorio premium de entretenimiento y acompañamiento."
    />

    <!-- El <link rel="manifest"> y el registro del SW los inyecta vite-plugin-pwa. -->

    <title>PrivvaClub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
